<style>
/* ═══════════════════════════════════════════════════════════════════
   FLAT TRACKER — style.css
   Material Design 3, mobilt först, responsiv layout
═══════════════════════════════════════════════════════════════════ */

/* ── RESET ───────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── DESIGN TOKENS ───────────────────────────────────────────────── */
:root {
  --primary:          #1565C0;
  --primary-light:    #1E88E5;
  --primary-dark:     #0D47A1;
  --accent:           #FF6F00;
  --accent-light:     #FFB300;

  --bg:               #F5F7FA;
  --surface:          #FFFFFF;
  --surface-2:        #EEF2F7;
  --divider:          rgba(0,0,0,0.10);

  --text-primary:     #1A1A2E;
  --text-secondary:   #5C6B7A;
  --text-hint:        #9AA5B1;
  --text-on-primary:  #FFFFFF;

  --success:          #2E7D32;
  --warning:          #F57F17;
  --error:            #C62828;
  --new-badge:        #E53935;

  --radius:           12px;
  --radius-sm:        8px;
  --radius-lg:        16px;
  --radius-full:      999px;

  --top-h:            56px;
  --nav-h:            64px;        /* mobil bottom nav */
  --sidebar-w:        240px;       /* desktop sidebar */

  --elev-1: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  --elev-2: 0 3px 6px rgba(0,0,0,0.12), 0 2px 4px rgba(0,0,0,0.08);
  --elev-3: 0 6px 16px rgba(0,0,0,0.12), 0 3px 6px rgba(0,0,0,0.08);

  --transition: 180ms ease;
}

/* ── BASE ─────────────────────────────────────────────────────────── */
html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Roboto', sans-serif;
  font-size: 16px;
  color: var(--text-primary);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

#root {
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* ══════════════════════════════════════════════════════════════════
   MOBIL LAYOUT (standard)
══════════════════════════════════════════════════════════════════ */

/* ── Top App Bar (mobil) ─────────────────────────────────────────── */
.top-bar {
  height: var(--top-h);
  background: var(--primary);
  color: var(--text-on-primary);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  box-shadow: var(--elev-2);
  z-index: 10;
}

.top-bar__title {
  font-size: 20px;
  font-weight: 500;
  letter-spacing: 0.15px;
  flex: 1;
}

.top-bar__action {
  background: none;
  border: none;
  color: var(--text-on-primary);
  padding: 8px;
  border-radius: var(--radius-full);
  cursor: pointer;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
}

.top-bar__action:hover { background: rgba(255,255,255,0.15); }

/* ── App body (mobil) ────────────────────────────────────────────── */
.app-body {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Screen content (mobil) ──────────────────────────────────────── */
.screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px;
  padding-bottom: calc(var(--nav-h) + 16px);
  -webkit-overflow-scrolling: touch;
}

.screen::-webkit-scrollbar { display: none; }

/* ── Bottom Navigation (mobil) ───────────────────────────────────── */
.bottom-nav {
  height: var(--nav-h);
  background: var(--surface);
  border-top: 1px solid var(--divider);
  display: flex;
  align-items: stretch;
  flex-shrink: 0;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
  z-index: 10;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px 4px;
  transition: background var(--transition);
  position: relative;
  color: var(--text-hint);
}

.nav-item:active { background: var(--surface-2); }
.nav-item.active  { color: var(--primary); }

.nav-item__icon  { font-size: 22px; line-height: 1; }
.nav-item__label { font-size: 11px; font-weight: 500; letter-spacing: 0.3px; }

.nav-item__badge {
  position: absolute;
  top: 6px;
  right: calc(50% - 18px);
  background: var(--new-badge);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  min-width: 16px;
  height: 16px;
  border-radius: var(--radius-full);
  padding: 0 4px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Desktop sidebar — dold på mobil */
.sidebar { display: none; }

/* ══════════════════════════════════════════════════════════════════
   DESKTOP LAYOUT  (≥ 768px)
══════════════════════════════════════════════════════════════════ */
@media (min-width: 768px) {

  #root {
    flex-direction: row;
    overflow: hidden;
  }

  /* ── Sidebar ───────────────────────────────────────────────────── */
  .sidebar {
    display: flex;
    flex-direction: column;
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--divider);
    flex-shrink: 0;
    z-index: 10;
    box-shadow: var(--elev-1);
  }

  .sidebar__brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--divider);
  }

  .sidebar__brand-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.2px;
  }

  .sidebar__nav {
    flex: 1;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .sidebar__item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    border-radius: var(--radius);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
    transition: background var(--transition), color var(--transition);
    position: relative;
    text-align: left;
    width: 100%;
  }

  .sidebar__item:hover  { background: var(--surface-2); color: var(--text-primary); }
  .sidebar__item.active { background: #E3F0FF; color: var(--primary); }

  .sidebar__item-icon  { font-size: 20px; flex-shrink: 0; }
  .sidebar__item-label { flex: 1; }

  .sidebar__item-badge {
    background: var(--new-badge);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    min-width: 20px;
    height: 20px;
    border-radius: var(--radius-full);
    padding: 0 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .sidebar__footer {
    padding: 16px;
    border-top: 1px solid var(--divider);
  }

  .sidebar__settings-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: var(--radius);
    background: none;
    border: none;
    cursor: pointer;
    width: 100%;
    font-size: 14px;
    color: var(--text-secondary);
    transition: background var(--transition);
  }

  .sidebar__settings-btn:hover { background: var(--surface-2); }

  .sidebar__avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* ── Main content area ─────────────────────────────────────────── */
  .app-body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Top bar på desktop ────────────────────────────────────────── */
  .top-bar {
    background: var(--surface);
    color: var(--text-primary);
    border-bottom: 1px solid var(--divider);
    box-shadow: none;
  }

  .top-bar__title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .top-bar__action {
    color: var(--text-secondary);
  }

  .top-bar__action:hover { background: var(--surface-2); }

  /* ── Dölj kugghjul i toppraden på desktop (finns i sidebar) ───── */
  .top-bar__action { display: none; }

  /* ── Screen på desktop ─────────────────────────────────────────── */
  .screen {
    padding: 24px 32px;
    padding-bottom: 24px;
    max-width: 900px;
  }

  /* ── Dölj bottom nav på desktop ────────────────────────────────── */
  .bottom-nav { display: none; }

  /* ── Två kolumner för kort på desktop ──────────────────────────── */
  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .card-grid .card { margin-bottom: 0; }
}

@media (min-width: 1200px) {
  :root { --sidebar-w: 260px; }
  .screen { max-width: 1100px; }
  .card-grid { grid-template-columns: 1fr 1fr 1fr; }
}

/* ══════════════════════════════════════════════════════════════════
   GEMENSAMMA KOMPONENTER
══════════════════════════════════════════════════════════════════ */

/* ── Card ─────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--elev-1);
  padding: 16px;
  margin-bottom: 12px;
}

.card--accent { border-left: 4px solid var(--accent); }
.card--new    { border-left: 4px solid var(--new-badge); }
.card--clickable { cursor: pointer; transition: box-shadow var(--transition); }
.card--clickable:hover { box-shadow: var(--elev-2); }

/* ── Section header ──────────────────────────────────────────────── */
.section-header {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin: 20px 0 10px;
}

.section-header:first-child { margin-top: 0; }

/* ── Chip ────────────────────────────────────────────────────────── */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: var(--radius-full);
  font-size: 12px;
  font-weight: 500;
}

.chip--primary { background: #E3F0FF; color: var(--primary); }
.chip--accent  { background: #FFF3E0; color: var(--warning); }
.chip--success { background: #E8F5E9; color: var(--success); }
.chip--error   { background: #FFEBEE; color: var(--error);   }
.chip--new     { background: var(--new-badge); color: #fff;  }

/* ── Button ──────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: var(--radius-full);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.4px;
  border: none;
  cursor: pointer;
  transition: box-shadow var(--transition), opacity var(--transition);
  font-family: inherit;
}

.btn--primary { background: var(--primary); color: var(--text-on-primary); box-shadow: var(--elev-1); }
.btn--primary:active { box-shadow: none; opacity: 0.9; }
.btn--text    { background: none; color: var(--primary); padding: 8px 12px; }
.btn--full    { width: 100%; }

/* ── FAB ─────────────────────────────────────────────────────────── */
.fab {
  position: fixed;
  bottom: calc(var(--nav-h) + 16px);
  right: 16px;
  width: 56px;
  height: 56px;
  border-radius: var(--radius-full);
  background: var(--accent);
  color: #fff;
  border: none;
  font-size: 24px;
  cursor: pointer;
  box-shadow: var(--elev-3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform var(--transition), box-shadow var(--transition);
  z-index: 20;
}

.fab:active { transform: scale(0.95); box-shadow: var(--elev-1); }

@media (min-width: 768px) {
  .fab { bottom: 24px; right: 32px; }
}

/* ── List item ───────────────────────────────────────────────────── */
.list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--divider);
}

.list-item:last-child { border-bottom: none; }

.list-item__icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-full);
  background: var(--surface-2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.list-item__content { flex: 1; min-width: 0; }
.list-item__title   { font-size: 15px; font-weight: 500; }
.list-item__sub     { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

/* ── Empty state ─────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-hint);
}

.empty-state__icon  { font-size: 48px; margin-bottom: 12px; }
.empty-state__title { font-size: 17px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
.empty-state__text  { font-size: 14px; line-height: 1.5; }

/* ── Spinner ─────────────────────────────────────────────────────── */
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--surface-2);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 32px auto;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Hunter chat ─────────────────────────────────────────────────── */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  padding-bottom: 8px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.chat-messages::-webkit-scrollbar { display: none; }

.chat-bubble {
  max-width: 82%;
  padding: 10px 14px;
  border-radius: var(--radius-lg);
  font-size: 14px;
  line-height: 1.5;
}

.chat-bubble--user   {
  align-self: flex-end;
  background: var(--primary);
  color: #fff;
  border-bottom-right-radius: 4px;
}

.chat-bubble--hunter {
  align-self: flex-start;
  background: var(--surface);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
  box-shadow: var(--elev-1);
}

.chat-input-row {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  background: var(--surface);
  border-top: 1px solid var(--divider);
  align-items: flex-end;
}

.chat-input {
  flex: 1;
  border: 1.5px solid var(--divider);
  border-radius: var(--radius-lg);
  padding: 10px 14px;
  font-size: 14px;
  font-family: inherit;
  resize: none;
  outline: none;
  background: var(--bg);
  color: var(--text-primary);
  transition: border-color var(--transition);
  max-height: 100px;
}

.chat-input:focus { border-color: var(--primary); }

.chat-send {
  width: 40px; height: 40px;
  border-radius: var(--radius-full);
  background: var(--primary);
  color: #fff;
  border: none;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity var(--transition);
}

.chat-send:disabled { opacity: 0.4; }

/* ── Login screen ────────────────────────────────────────────────── */
.login-screen {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  text-align: center;
  background: var(--bg);
}

.login-screen__title { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
.login-screen__sub   { font-size: 15px; color: var(--text-secondary); margin-bottom: 40px; line-height: 1.5; max-width: 300px; }

.btn--google {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 24px;
  border-radius: var(--radius-full);
  background: var(--surface);
  border: 1.5px solid var(--divider);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  box-shadow: var(--elev-1);
  width: 100%;
  max-width: 280px;
  justify-content: center;
  font-family: inherit;
  transition: box-shadow var(--transition);
}

.btn--google:active { box-shadow: none; }

/* ── Input / form ────────────────────────────────────────────────── */
.input {
  width: 100%;
  border: 1.5px solid var(--divider);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 15px;
  font-family: inherit;
  outline: none;
  background: var(--surface);
  color: var(--text-primary);
  transition: border-color var(--transition);
}

.input:focus { border-color: var(--primary); }

.input-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
  display: block;
}

/* ── Inställningsmeny (bottom sheet) ─────────────────────────────── */
.settings-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  display: flex;
  align-items: flex-end;
}

.settings-sheet {
  background: var(--surface);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 16px 20px 32px;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  box-shadow: var(--elev-3);
  animation: slideUp 220ms ease;
}

@media (min-width: 768px) {
  .settings-overlay {
    align-items: flex-end;
    justify-content: flex-start;
    padding-left: calc(var(--sidebar-w) + 12px);
    padding-bottom: 16px;
  }
  .settings-sheet {
    border-radius: var(--radius-lg);
    max-width: 360px;
    margin: 0;
    animation: fadeIn 180ms ease;
  }
}

.settings-handle {
  width: 40px; height: 4px;
  background: var(--divider);
  border-radius: var(--radius-full);
  margin: 0 auto 20px;
}

@media (min-width: 768px) { .settings-handle { display: none; } }

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes fadeIn  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ── Utilities ───────────────────────────────────────────────────── */
.mt-8  { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.flex  { display: flex; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.flex-center  { display: flex; justify-content: center; align-items: center; }
.gap-8  { gap: 8px; }
.gap-12 { gap: 12px; }
.text-sm    { font-size: 13px; }
.text-bold  { font-weight: 700; }
.text-muted { color: var(--text-secondary); }
.text-accent { color: var(--accent); }
.text-primary-color { color: var(--primary); }

/* ── IO FLYOUT ───────────────────────────────────────────────────── */
.io-overlay {
  position: fixed;
  inset: 0;
  z-index: 40;
  background: rgba(0,0,0,0.25);
}

/* Mobil: bottom sheet */
.io-flyout {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 85vh;
  background: var(--surface);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  box-shadow: var(--elev-3);
  z-index: 50;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 220ms ease;
  pointer-events: none;
}

.io-flyout--open {
  transform: translateY(0);
  pointer-events: all;
}

/* Desktop: panel från höger som overlay */
@media (min-width: 768px) {

// utils.js — hjälpfunktioner för Flat Tracker

// ── Formatera pris i SEK ─────────────────────────────────────────────
function formatPrice(sek) {
  if (!sek) return '—';
  if (sek >= 1000000) return (sek / 1000000).toFixed(1).replace('.', ',') + ' mkr';
  return sek.toLocaleString('sv-SE') + ' kr';
}

// ── Relativ tid (t.ex. "5 min sedan") ───────────────────────────────
function timeAgo(date) {
  const seconds = Math.floor((Date.now() - new Date(date)) / 1000);
  if (seconds < 60)   return 'Just nu';
  if (seconds < 3600) return Math.floor(seconds / 60) + ' min sedan';
  if (seconds < 86400) return Math.floor(seconds / 3600) + ' tim sedan';
  return Math.floor(seconds / 86400) + ' d sedan';
}

// ── Kvadratmeter ─────────────────────────────────────────────────────
function formatSqm(sqm) {
  return sqm ? sqm + ' m²' : '—';
}

// ── Månadsavgift ─────────────────────────────────────────────────────
function formatRent(kr) {
  return kr ? kr.toLocaleString('sv-SE') + ' kr/mån' : '—';
}

// ── Antal rum ────────────────────────────────────────────────────────
function roomLabel(n) {
  if (!n) return '—';
  return n === 1 ? '1 rum' : n + ' rum';
}

// ── Trunkera text ────────────────────────────────────────────────────
function truncate(str, max = 40) {
  if (!str) return '';
  return str.length <= max ? str : str.slice(0, max - 1) + '…';
}

// ── Generera lokalt ID ───────────────────────────────────────────────
function localId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ── Generera inbjudningskod (6 tecken) ───────────────────────────────
function generateInviteCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) {
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code;
}

// ── IoFlyout ─────────────────────────────────────────────────────────
function IoFlyout({ household, open, onClose }) {
  const [messages, setMessages] = React.useState([
    { id: 'welcome', role: 'io', text: 'Hej! Jag är Io 🔍 Fråga mig om lägenheter, priser eller områden.' }
  ]);
  const [input, setInput]     = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const bottomRef = React.useRef(null);
  const apiKey    = household?.anthropicKey || '';

  React.useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, open]);

  async function sendMessage() {
    const text = input.trim();
    if (!text || loading) return;

    if (!apiKey) {
      setMessages(prev => [...prev, {
        id: localId(), role: 'io',
        text: 'Io är inte aktiv ännu. Hushållsägaren behöver lägga till en Anthropic API-nyckel i Inställningar.',
      }]);
      return;
    }

    setMessages(prev => [...prev, { id: localId(), role: 'user', text }]);
    setInput('');
    setLoading(true);

    try {
      const history = messages
        .filter(m => m.id !== 'welcome')
        .map(m => ({ role: m.role === 'io' ? 'assistant' : 'user', content: m.text }));

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: CLAUDE_MODEL,
          max_tokens: 1000,
          system: IO_SYSTEM_PROMPT,
          messages: [...history, { role: 'user', content: text }],
        }),
      });

      const data = await res.json();
      if (!res.ok) {
        if (res.status === 401) throw new Error('API-nyckeln är ogiltig eller saknas.');
        if (res.status === 403) throw new Error('API-nyckeln saknar behörighet eller fakturering är inte aktiverad.');
        if (res.status === 429) throw new Error('För många förfrågningar, försök igen om en stund.');
        throw new Error(`API-fel ${res.status}`);
      }
      const reply = data.content?.[0]?.text || 'Tyvärr kunde jag inte hämta ett svar.';
      setMessages(prev => [...prev, { id: localId(), role: 'io', text: reply }]);
    } catch (err) {
      setMessages(prev => [...prev, {
        id: localId(), role: 'io',
        text: `Fel: ${err.message}`,
      }]);
    } finally {
      setLoading(false);
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  return (
    <>
      {/* Overlay — bara på mobil */}
      {open && <div className="io-overlay" onClick={onClose} />}

      <div className={`io-flyout ${open ? 'io-flyout--open' : ''}`}>
        {/* Header */}
        <div className="io-flyout__header">
          <div className="flex gap-8" style={{ alignItems: 'center' }}>
            <div className="io-flyout__avatar">Io</div>
            <div>
              <div style={{ fontWeight: 600, fontSize: 15 }}>Io</div>
              <div style={{ fontSize: 12, color: 'var(--text-hint)' }}>AI-assistent</div>
            </div>
          </div>
          <button className="io-flyout__close" onClick={onClose}>✕</button>
        </div>

        {/* Meddelanden */}
        <div className="io-flyout__messages" ref={bottomRef}>
          {messages.map(m => (
            <div key={m.id} className={`chat-bubble chat-bubble--${m.role === 'io' ? 'hunter' : 'user'}`}>
              {m.text}
            </div>
          ))}
          {loading && (
            <div className="chat-bubble chat-bubble--hunter text-muted">Tänker…</div>
          )}
          <div ref={bottomRef} />
        </div>

        {/* Inmatning */}
        <div className="chat-input-row">
          <textarea
            className="chat-input"
            rows={1}
            placeholder="Fråga Io något…"
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={handleKey}
          />
          <button className="chat-send" onClick={sendMessage} disabled={!input.trim() || loading}>
            ➤
          </button>
        </div>
      </div>
    </>
  );
}

// household.js — hushållslogik för Flat Tracker

// ── Skapa nytt hushåll ───────────────────────────────────────────────
async function createHousehold(user) {
  const { db, collection, doc, setDoc, serverTimestamp } = window.__firebase;
  const householdId = localId();
  const inviteCode  = generateInviteCode();

  await setDoc(doc(db, COLLECTIONS.HOUSEHOLDS, householdId), {
    name:      'Vårt lägenhetssökande',
    members:   [user.uid],
    inviteCode,
    createdBy: user.uid,
    createdAt: serverTimestamp(),
  });

  await setDoc(doc(db, COLLECTIONS.USERS, user.uid), {
    householdId,
    email:       user.email,
    displayName: user.displayName,
    updatedAt:   serverTimestamp(),
  }, { merge: true });

  return { householdId, inviteCode };
}

// ── Gå med i hushåll via inbjudningskod ─────────────────────────────
async function joinHousehold(user, code) {
  const { db, collection, doc, setDoc, getDocs, updateDoc, query, where, serverTimestamp } = window.__firebase;

  const q = query(
    collection(db, COLLECTIONS.HOUSEHOLDS),
    where('inviteCode', '==', code.toUpperCase().trim())
  );
  const snap = await getDocs(q);

  if (snap.empty) throw new Error('Ingen inbjudan hittades med den koden. Kontrollera och försök igen.');

  const householdDoc = snap.docs[0];
  const householdId  = householdDoc.id;
  const data         = householdDoc.data();

  if (data.members.includes(user.uid)) throw new Error('Du är redan medlem i det här hushållet.');
  if (data.members.length >= 2) throw new Error('Det här hushållet är redan fullt (max 2 medlemmar).');

  await updateDoc(doc(db, COLLECTIONS.HOUSEHOLDS, householdId), {
    members: [...data.members, user.uid],
  });

  await setDoc(doc(db, COLLECTIONS.USERS, user.uid), {
    householdId,
    email:       user.email,
    displayName: user.displayName,
    updatedAt:   serverTimestamp(),
  }, { merge: true });

  return householdId;
}

// ── Hämta hushålls-ID för en användare ──────────────────────────────
async function getHouseholdId(uid) {
  const { db, doc, getDoc } = window.__firebase;
  const snap = await getDoc(doc(db, COLLECTIONS.USERS, uid));
  if (!snap.exists()) return null;
  return snap.data().householdId || null;
}

// ── Spara Anthropic API-nyckel ───────────────────────────────────────
async function saveHouseholdApiKey(householdId, apiKey) {
  const { db, doc, updateDoc } = window.__firebase;
  await updateDoc(doc(db, COLLECTIONS.HOUSEHOLDS, householdId), {
    anthropicKey: apiKey,
  });
}

// ── Spara Apify API-nyckel ───────────────────────────────────────────
async function saveHouseholdApifyKey(householdId, apifyKey) {
  const { db, doc, updateDoc } = window.__firebase;
  await updateDoc(doc(db, COLLECTIONS.HOUSEHOLDS, householdId), {
    apifyKey,
  });
}

// ── HouseholdSetup — skärm för att skapa eller gå med i hushåll ─────
function HouseholdSetupScreen({ user, onComplete }) {
  const [view, setView]             = React.useState('choice');
  const [inviteCode, setInviteCode] = React.useState('');
  const [joinCode, setJoinCode]     = React.useState('');
  const [loading, setLoading]       = React.useState(false);
  const [error, setError]           = React.useState('');

  async function handleCreate() {
    setLoading(true);
    setError('');
    try {
      const { inviteCode: code } = await createHousehold(user);
      setInviteCode(code);
      setView('created');
    } catch (e) {
      setError('Något gick fel. Försök igen.');
    } finally {
      setLoading(false);
    }
  }

  async function handleJoin() {
    if (!joinCode.trim()) return;
    setLoading(true);
    setError('');
    try {
      await joinHousehold(user, joinCode);
      onComplete();
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }

  if (view === 'choice') return (
    <div className="login-screen">
      <div className="login-screen__logo">🏡</div>
      <div className="login-screen__title">Välkommen!</div>
      <div className="login-screen__sub">

      </div>
      <button className="btn btn--primary btn--full" onClick={() => setView('create')}
        style={{ maxWidth: 280, marginBottom: 12 }}>
        Skapa nytt hushåll
      </button>
      <button className="btn--google" onClick={() => setView('join')}
        style={{ maxWidth: 280 }}>
        Gå med med kod
      </button>
    </div>
  );

  if (view === 'create') return (
    <div className="login-screen">
      <div className="login-screen__logo">🏡</div>
      <div className="login-screen__title">Skapa hushåll</div>
      <div className="login-screen__sub">
        Vi skapar ett delat hushåll för er lägenhetssökning.
        Du får en inbjudningskod att dela med din medsökare.
      </div>
      {error && <div style={{ color: 'var(--error)', fontSize: 14, marginBottom: 12 }}>{error}</div>}
      <button className="btn btn--primary btn--full" onClick={handleCreate} disabled={loading}
        style={{ maxWidth: 280, marginBottom: 12 }}>
        {loading ? 'Skapar…' : 'Skapa hushåll'}
      </button>
      <button className="btn btn--text" onClick={() => setView('choice')}>← Tillbaka</button>
    </div>
  );

  if (view === 'created') return (
    <div className="login-screen">
      <div className="login-screen__logo">🎉</div>
      <div className="login-screen__title">Hushåll skapat!</div>
      <div className="login-screen__sub">
        Dela den här koden med din medsökare så kan de gå med.
      </div>
      <div style={{
        fontSize: 36, fontWeight: 700, letterSpacing: 8,
        color: 'var(--primary)', margin: '24px 0',
        background: 'var(--surface-2)', padding: '16px 32px',
        borderRadius: 'var(--radius)', fontFamily: 'monospace',
      }}>
        {inviteCode}
      </div>
      <div style={{ fontSize: 13, color: 'var(--text-hint)', marginBottom: 24 }}>
        Koden kan användas en gång
      </div>
      <button className="btn btn--primary btn--full" onClick={onComplete}
        style={{ maxWidth: 280 }}>
        Fortsätt till appen →
      </button>
    </div>
  );

  if (view === 'join') return (
    <div className="login-screen">
      <div className="login-screen__logo">🔑</div>
      <div className="login-screen__title">Gå med i hushåll</div>
      <div className="login-screen__sub">
        Ange inbjudningskoden du fått från din medsökare.
      </div>
      <input
        className="input"
        style={{ maxWidth: 280, textAlign: 'center', fontSize: 24, letterSpacing: 6,
          fontFamily: 'monospace', textTransform: 'uppercase', marginBottom: 12 }}
        placeholder="ABC123"
        value={joinCode}
        onChange={e => setJoinCode(e.target.value.toUpperCase())}
        maxLength={6}
      />
      {error && <div style={{ color: 'var(--error)', fontSize: 14, marginBottom: 12 }}>{error}</div>}
      <button className="btn btn--primary btn--full" onClick={handleJoin}
        disabled={loading || joinCode.length < 6} style={{ maxWidth: 280, marginBottom: 12 }}>
        {loading ? 'Söker…' : 'Gå med'}
      </button>
      <button className="btn btn--text" onClick={() => { setView('choice'); setError(''); }}>
        ← Tillbaka
      </button>
    </div>
  );

  return null;
}

// ── Hjälpfunktion: Io-analys av en annons ───────────────────────────
async function fetchIoAnalysis(listing, anthropicKey) {
  const prompt = 'Analysera den här bostadsannonsen kort och koncist (max 4-5 meningar). ' +
    'Ta upp: läge och område, pris per kvm jämfört med Malmö-snittet, vad som sticker ut (positivt/negativt), ' +
    'och en kortfattad rekommendation.\n\n' +
    'Annons:\n' +
    'Adress: ' + (listing.street || '') + '\n' +
    'Område: ' + (listing.area || '') + ', ' + (listing.city || '') + '\n' +
    'Pris: ' + (listing.price ? formatPrice(listing.price) : 'okänt') + '\n' +
    'Storlek: ' + (listing.sqm ? formatSqm(listing.sqm) : 'okänt') + '\n' +
    'Rum: ' + (listing.rooms ? roomLabel(listing.rooms) : 'okänt') + '\n' +
    'Månadsavgift: ' + (listing.monthlyFee ? formatRent(listing.monthlyFee) : 'okänd') + '\n' +
    'Balkong: ' + (listing.hasBalcony ? 'Ja' : 'Nej') + '\n' +
    'Hiss: ' + (listing.hasElevator ? 'Ja' : 'Nej') + '\n' +
    'Mäklare: ' + (listing.agencyName || 'okänd') + '\n' +
    'Källa: ' + (listing.source || '');

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': anthropicKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 300,
      system: IO_SYSTEM_PROMPT,
      messages: [{ role: 'user', content: prompt }],
    }),
  });

  if (!res.ok) throw new Error('API-fel ' + res.status);
  const data = await res.json();
  return (data.content && data.content.find(b => b.type === 'text') || {}).text || '';
}

function ListingCard({ listing, householdId, anthropicKey, watched, onToggleWatch }) {
  const [expanded, setExpanded]     = React.useState(false);
  const [analysis, setAnalysis]     = React.useState(null);
  const [analyzing, setAnalyzing]   = React.useState(false);
  const [analysisErr, setAnalysisErr] = React.useState(null);

  const {
    street, area, city, rooms, sqm, price,
    monthlyFee, createdAt, url, source,
    agentName, agencyName, agentEmail,
    showings,
  } = listing;

  const oneDayAgo    = Date.now() - 24 * 60 * 60 * 1000;
  const isNew        = (createdAt || 0) > oneDayAgo;
  const fee          = monthlyFee || 0;
  const pricePerSqm  = price && sqm ? Math.round(price / sqm) : null;

  async function handleToggleWatch() {
    onToggleWatch(listing.id, !watched);
    if (!watched && !analysis) {
      await runAnalysis();
    }
  }

  async function runAnalysis() {
    if (!anthropicKey) { setAnalysisErr('API-nyckel saknas.'); return; }
    setAnalyzing(true);
    setAnalysisErr(null);
    setExpanded(true);
    try {
      const text = await fetchIoAnalysis(listing, anthropicKey);
      setAnalysis(text);
    } catch (e) {
      setAnalysisErr('Kunde inte hämta analys: ' + e.message);
    } finally {
      setAnalyzing(false);
    }
  }

  return (
    <div className={'listing-card' + (watched ? ' listing-card--watched' : '') + (isNew ? ' listing-card--new' : '')}>

      {/* ── Huvud ── */}
      <div className="listing-card__header">
        <div className="listing-card__title-group">
          <div className="listing-card__address">
            {url
              ? <a href={url} target="_blank" rel="noopener noreferrer"
                  className="listing-card__address-link">{street || '—'}</a>
              : <span>{street || '—'}</span>}
          </div>
          <div className="listing-card__meta">{[area, city].filter(Boolean).join(', ') || '—'}</div>
        </div>
        <div className="listing-card__badges">
          {isNew && <span className="badge badge--new">NY</span>}
          {watched && <span className="badge badge--watched">⭐</span>}
          {source && <span className={'badge badge--source badge--' + source}>{source}</span>}
        </div>
      </div>

      {/* ── Nyckeltal ── */}
      <div className="listing-card__stats">
        {rooms > 0 && <span className="stat">{roomLabel(rooms)}</span>}
        {sqm > 0 && <span className="stat">{formatSqm(sqm)}</span>}
        {price > 0 && <span className="stat stat--price">{formatPrice(price)}</span>}
        {pricePerSqm && <span className="stat stat--muted">{formatPrice(pricePerSqm)}/m²</span>}
      </div>

      {/* ── Detaljer ── */}
      <div className="listing-card__details">
        {fee > 0 && (
          <span className="listing-card__detail">
            <span className="listing-card__detail-label">Avgift</span>
            <span>{formatRent(fee)}/mån</span>
          </span>
        )}
        {agencyName && (
          <span className="listing-card__detail">
            <span className="listing-card__detail-label">Mäklare</span>
            <span>{agencyName}</span>
          </span>
        )}
        {agentName && (
          <span className="listing-card__detail">
            <span className="listing-card__detail-label">Ansvarig</span>
            {agentEmail
              ? <a href={'mailto:' + agentEmail} className="listing-card__link">{agentName}</a>
              : <span>{agentName}</span>}
          </span>
        )}
        {createdAt && (
          <span className="listing-card__detail">
            <span className="listing-card__detail-label">Inkom</span>
            <span>{timeAgo(createdAt)}</span>
          </span>
        )}
      </div>

      {/* ── Visningstider ── */}
      {showings && showings.length > 0 && (
        <div className="listing-card__showings">
          <span className="listing-card__detail-label">Visning</span>
          {showings.map(function(s, i) {
            return <span key={i} className="listing-card__showing">{s.date}{s.time ? ' ' + s.time : ''}</span>;
          })}
        </div>
      )}

      {/* ── Åtgärder ── */}
      <div className="listing-card__actions">
        <button
          className={'btn-watch' + (watched ? ' btn-watch--active' : '')}
          onClick={handleToggleWatch}
          title={watched ? 'Sluta bevaka' : 'Bevaka'}>
          {watched ? '⭐ Bevakas' : '☆ Bevaka'}
        </button>
        <button
          className="btn-analyze"
          onClick={function() {
            if (!analysis && !analyzing) { runAnalysis(); }
            else { setExpanded(function(v) { return !v; }); }
          }}
          title="Io-analys">
          Io-analys {expanded ? '▲' : '▼'}
        </button>
      </div>

      {/* ── Io-analys expanderbar ── */}
      {expanded && (
        <div className="listing-card__analysis">
          {analyzing && (
            <div className="listing-card__analysis-loading">
              <div className="spinner" style={{ width: 16, height: 16, borderWidth: 2 }} />
              <span>Io analyserar…</span>
            </div>
          )}
          {analysisErr && <div className="listing-card__analysis-error">{analysisErr}</div>}
          {analysis && <div className="listing-card__analysis-text">{analysis}</div>}
        </div>
      )}
    </div>
  );
}

// ── FlödesSkärm ──────────────────────────────────────────────────────
function FeedScreen({ user, householdId, household, profiles }) {
  const [listings,    setListings]    = React.useState([]);
  const [loading,     setLoading]     = React.useState(true);
  const [error,       setError]       = React.useState(null);
  const [watched,     setWatched]     = React.useState({});
  const [sortBy,      setSortBy]      = React.useState('createdAt');
  const [sortDir,     setSortDir]     = React.useState('desc');
  const [filterSource,  setFilterSource]  = React.useState('');
  const [filterAgency,  setFilterAgency]  = React.useState('');
  const [filterArea,    setFilterArea]    = React.useState('');
  const [filterStreet,  setFilterStreet]  = React.useState('');
  const [filterWatched, setFilterWatched] = React.useState(false);
  const [showFilters,   setShowFilters]   = React.useState(false);

  const anthropicKey = household && household.anthropicKey;

  // ── Ladda annonser ────────────────────────────────────────────────
  React.useEffect(function() {
    if (!householdId) return;
    var fb = window.__firebase;
    var q = fb.query(
      fb.collection(fb.db, 'listings'),
      fb.where('matchedHouseholds', 'array-contains', householdId),
      fb.orderBy('createdAt', 'desc'),
      fb.limit(200)
    );
    var unsub = fb.onSnapshot(q,
      function(snap) {
        setListings(snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); }));
        setLoading(false);
      },
      function(err) {
        console.error('Firestore-fel:', err);
        setError('Kunde inte ladda annonser.');
        setLoading(false);
      }
    );
    return unsub;
  }, [householdId]);

  // ── Ladda bevakningar från Firestore ──────────────────────────────
  React.useEffect(function() {
    if (!householdId) return;
    var fb = window.__firebase;
    var ref = fb.doc(fb.db, 'households', householdId);
    var unsub = fb.onSnapshot(ref, function(snap) {
      if (snap.exists()) {
        setWatched(snap.data().watchedListings || {});
      }
    });
    return unsub;
  }, [householdId]);

  // ── Växla bevakning ───────────────────────────────────────────────
  async function handleToggleWatch(listingId, newVal) {
    var fb = window.__firebase;
    var ref = fb.doc(fb.db, 'households', householdId);
    var updated = Object.assign({}, watched, {});
    if (newVal) { updated[listingId] = true; }
    else { delete updated[listingId]; }
    setWatched(updated);
    await fb.updateDoc(ref, { watchedListings: updated });
  }

  // ── Sortering ─────────────────────────────────────────────────────
  function toggleSort(field) {
    if (sortBy === field) {
      setSortDir(function(d) { return d === 'asc' ? 'desc' : 'asc'; });
    } else {
      setSortBy(field);
      setSortDir(field === 'createdAt' ? 'desc' : 'asc');
    }
  }

  function sortIcon(field) {
    if (sortBy !== field) return '↕';
    return sortDir === 'asc' ? '↑' : '↓';
  }

  // ── Unika värden för filter ───────────────────────────────────────
  var sources  = Array.from(new Set(listings.map(function(l) { return l.source; }).filter(Boolean))).sort();
  var agencies = Array.from(new Set(listings.map(function(l) { return l.agencyName; }).filter(Boolean))).sort();
  var areas    = Array.from(new Set(listings.map(function(l) { return l.area; }).filter(Boolean))).sort();
  var streets  = Array.from(new Set(listings.map(function(l) { return l.street; }).filter(Boolean))).sort();

  // ── Filtrera ──────────────────────────────────────────────────────
  var filtered = listings.filter(function(l) {
    if (filterSource  && l.source     !== filterSource)  return false;
    if (filterAgency  && l.agencyName !== filterAgency)  return false;
    if (filterArea    && l.area       !== filterArea)     return false;
    if (filterStreet  && l.street     !== filterStreet)   return false;
    if (filterWatched && !watched[l.id])                  return false;
    return true;
  });

  // ── Sortera ───────────────────────────────────────────────────────
  var sorted = filtered.slice().sort(function(a, b) {
    var av = a[sortBy] || 0;
    var bv = b[sortBy] || 0;
    return sortDir === 'asc' ? av - bv : bv - av;
  });

  var oneDayAgo   = Date.now() - 24 * 60 * 60 * 1000;
  var newCount    = listings.filter(function(l) { return (l.createdAt || 0) > oneDayAgo; }).length;
  var watchCount  = Object.keys(watched).length;
  var activeFilters = [filterSource, filterAgency, filterArea, filterStreet, filterWatched].filter(Boolean).length;

  if (loading) return (
    <div className="screen">
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 40, gap: 12 }}>
        <div className="spinner" />
        <p style={{ color: 'var(--text-secondary)', fontSize: 14 }}>Laddar annonser…</p>
      </div>
    </div>
  );

  return (
    <div className="feed-screen">

      {/* ── Statusrad ── */}
      <div className="feed-statusbar">
        <span className="feed-count">
          {sorted.length} av {listings.length} annonser
          {newCount > 0 && <span className="badge badge--new" style={{ marginLeft: 8 }}>{newCount} nya</span>}
          {watchCount > 0 && <span className="badge badge--watched" style={{ marginLeft: 8 }}>⭐ {watchCount}</span>}
        </span>
        <span className="feed-auto-label">Hämtas automatiskt</span>
      </div>

      {error && (
        <div className="feed-error">{error}</div>
      )}

      {/* ── Sortering ── */}
      <div className="feed-sort">
        {[
          { key: 'createdAt', label: 'Datum' },
          { key: 'rooms',     label: 'Rum' },
          { key: 'sqm',       label: 'Storlek' },
          { key: 'price',     label: 'Pris' },
        ].map(function(s) {
          return (
            <button
              key={s.key}
              className={'sort-btn' + (sortBy === s.key ? ' sort-btn--active' : '')}
              onClick={function() { toggleSort(s.key); }}>
              {s.label} {sortIcon(s.key)}
            </button>
          );
        })}
      </div>

      {/* ── Filter-toggle ── */}
      <div className="feed-filter-toggle">
        <button
          className={'btn-filter-toggle' + (showFilters ? ' active' : '') + (activeFilters > 0 ? ' has-filters' : '')}
          onClick={function() { setShowFilters(function(v) { return !v; }); }}>
          Filter {activeFilters > 0 ? '(' + activeFilters + ')' : ''} {showFilters ? '▲' : '▼'}
        </button>
        {activeFilters > 0 && (
          <button className="btn-clear-filters" onClick={function() {
            setFilterSource(''); setFilterAgency(''); setFilterArea('');
            setFilterStreet(''); setFilterWatched(false);
          }}>Rensa</button>
        )}
      </div>

      {/* ── Filter-panel ── */}
      {showFilters && (
        <div className="feed-filters">
          <div className="filter-row">
            <label className="filter-label">Källa</label>
            <select className="filter-select" value={filterSource}
              onChange={function(e) { setFilterSource(e.target.value); }}>
              <option value="">Alla</option>
              {sources.map(function(s) { return <option key={s} value={s}>{s}</option>; })}
            </select>
          </div>
          <div className="filter-row">
            <label className="filter-label">Mäklare</label>
            <select className="filter-select" value={filterAgency}
              onChange={function(e) { setFilterAgency(e.target.value); }}>
              <option value="">Alla</option>
              {agencies.map(function(a) { return <option key={a} value={a}>{a}</option>; })}
            </select>
          </div>
          <div className="filter-row">
            <label className="filter-label">Område</label>
            <select className="filter-select" value={filterArea}
              onChange={function(e) { setFilterArea(e.target.value); }}>
              <option value="">Alla</option>
              {areas.map(function(a) { return <option key={a} value={a}>{a}</option>; })}
            </select>
          </div>
          <div className="filter-row">
            <label className="filter-label">Gata</label>
            <select className="filter-select" value={filterStreet}
              onChange={function(e) { setFilterStreet(e.target.value); }}>
              <option value="">Alla</option>
              {streets.map(function(s) { return <option key={s} value={s}>{s}</option>; })}
            </select>
          </div>
          <div className="filter-row">
            <label className="filter-label filter-label--checkbox">
              <input type="checkbox" checked={filterWatched}
                onChange={function(e) { setFilterWatched(e.target.checked); }} />
              Visa endast bevakade
            </label>
          </div>
        </div>
      )}

      {/* ── Annonslist ── */}
      {sorted.length === 0 ? (
        <EmptyState
          icon="🏠"
          title="Inga annonser"
          text={listings.length > 0 ? 'Inga annonser matchar dina filter.' : 'Annonser hämtas automatiskt när nya bevakningsmail kommer in.'}
        />
      ) : (
        <div className="listings-list">
          {sorted.map(function(l) {
            return (
              <ListingCard
                key={l.id}
                listing={l}
                householdId={householdId}
                anthropicKey={anthropicKey}
                watched={!!watched[l.id]}
                onToggleWatch={handleToggleWatch}
              />
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── OmrådesSkärm ─────────────────────────────────────────────────────
function AreasScreen({ user, householdId }) {
  return (
    <div className="screen">
      <EmptyState
        icon="🗺️"
        title="Områden"
        text="Hantering av bevakade områden och gator kommer i nästa sprint."
      />
    </div>
  );
}

// app.js — rot-komponent för Flat Tracker

const { useState, useEffect } = React;

function App() {
  const [user, setUser]                 = useState(undefined);
  const [householdId, setHouseholdId]   = useState(undefined);
  const [household, setHousehold]       = useState(null);
  const [profiles, setProfiles]         = useState([]);
  const [tab, setTab]                   = useState('feed');
  const [showSettings, setShowSettings] = useState(false);
  const [showIo, setShowIo]             = useState(false);
  const [newCount]                      = useState(0);

  // ── Auth-lyssnare ──────────────────────────────────────────────────
  useEffect(() => {
    const { auth, onAuthStateChanged } = window.__firebase;
    const unsub = onAuthStateChanged(auth, async u => {
      if (!u) {
        setUser(null); setHouseholdId(null); setHousehold(null);
        return;
      }
      setUser(u);
      const hid = await getHouseholdId(u.uid);
      setHouseholdId(hid || null);
    });
    return unsub;
  }, []);

  // ── Hämta hushållsdata ─────────────────────────────────────────────
  useEffect(() => {
    if (!householdId) return;
    const { db, doc, onSnapshot } = window.__firebase;
    const unsub = onSnapshot(doc(db, COLLECTIONS.HOUSEHOLDS, householdId), snap => {
      if (snap.exists()) setHousehold({ id: snap.id, ...snap.data() });
    });
    return unsub;
  }, [householdId]);

  // ── Hämta bevakningsprofiler ───────────────────────────────────────
  useEffect(() => {
    if (!householdId) return;
    const { db, collection, query, where, onSnapshot } = window.__firebase;
    const q = query(
      collection(db, COLLECTIONS.HOUSEHOLDS, householdId, 'profiles'),
      where('active', '==', true)
    );
    const unsub = onSnapshot(q, snap => {
      setProfiles(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
    return unsub;
  }, [householdId]);

  // ── Google-inloggning ──────────────────────────────────────────────
  function handleLogin() {
    const { auth, GoogleAuthProvider, signInWithPopup } = window.__firebase;
    signInWithPopup(auth, new GoogleAuthProvider())
      .catch(err => console.error('Inloggningsfel', err));
  }

  // ── Logga ut ───────────────────────────────────────────────────────
  function handleSignOut() {
    const { auth, signOut } = window.__firebase;
    signOut(auth);
    setShowSettings(false);
  }

  // ── Hushåll klart ─────────────────────────────────────────────────
  async function handleHouseholdComplete() {
    const hid = await getHouseholdId(user.uid);
    setHouseholdId(hid);
  }

  // ── Laddar ────────────────────────────────────────────────────────
  if (user === undefined || (user && householdId === undefined)) {
    return (
      <div className="spinner-screen">
        <Spinner />
      </div>
    );
  }

  if (user === null) {
    return <div style={{ height:'100%', width:'100%' }}><LoginScreen onLogin={handleLogin} /></div>;
  }

  if (!householdId) {
    return <div style={{ height:'100%', width:'100%' }}><HouseholdSetupScreen user={user} onComplete={handleHouseholdComplete} /></div>;
  }

  // ── Rendrera skärm ────────────────────────────────────────────────
  const skärmTitlar = {
    feed:      'Flöde',
    watchlist: 'Bevakning',
    areas:     'Områden',
  };

  function visaSkärm() {
    const props = { user, householdId, household, profiles };
    switch (tab) {
      case 'feed':      return <FeedScreen {...props} />;
      case 'watchlist': return <WatchlistScreen {...props} />;
      case 'areas':     return <AreasScreen {...props} />;
      default:          return <FeedScreen {...props} />;
    }
  }

  const badge = { feed: newCount };

  return (
    <>
      {/* ── Desktop sidebar ────────────────────────────────────────── */}
      <aside className="sidebar">
        <div className="sidebar__brand">
          <Logo size={32} />
          <span className="sidebar__brand-name">Flat Tracker</span>
        </div>

        <nav className="sidebar__nav">
          {TABS.map(t => (
            <button
              key={t.id}
              className={`sidebar__item ${tab === t.id ? 'active' : ''}`}
              onClick={() => setTab(t.id)}
            >
              <span className="sidebar__item-icon">{t.icon}</span>
              <span className="sidebar__item-label">{t.label}</span>
              {badge[t.id] > 0 && (
                <span className="sidebar__item-badge">{badge[t.id]}</span>
              )}
            </button>
          ))}

          {/* Io i sidebaren */}
          <button
            className={`sidebar__item ${showIo ? 'active' : ''}`}
            onClick={() => setShowIo(v => !v)}
          >
            <span className="sidebar__item-icon">
              <span style={{ fontWeight: 700, fontSize: 14 }}>Io</span>
            </span>
            <span className="sidebar__item-label">Io — AI</span>
          </button>
        </nav>

        <div className="sidebar__footer">
          <button className="sidebar__settings-btn" onClick={() => setShowSettings(true)}>
            <div className="sidebar__avatar">
              {user?.displayName?.[0]?.toUpperCase() || '?'}
            </div>
            <div style={{ flex: 1, textAlign: 'left' }}>
              <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--text-primary)' }}>
                {user?.displayName}
              </div>
              <div style={{ fontSize: 11, color: 'var(--text-hint)' }}>Inställningar</div>
            </div>
            <span style={{ fontSize: 16 }}>⚙️</span>
          </button>
        </div>
      </aside>

      {/* ── Huvudinnehåll ──────────────────────────────────────────── */}
      <div className="app-body">
        <TopBar
          title={skärmTitlar[tab]}
          onMenuOpen={() => setShowSettings(true)}
        />
        {visaSkärm()}
        <BottomNav active={tab} onChange={t => { setTab(t); setShowIo(false); }} badge={badge} />
        {/* Io FAB — följer med app-body på desktop */}
        <IoButton onClick={() => setShowIo(v => !v)} active={showIo} />
      </div>

      {/* ── Io Flyout — rotnivå så den skjuter in layouten ─────────── */}
      <IoFlyout
        household={household}
        open={showIo}
        onClose={() => setShowIo(false)}
      />

      {/* ── Inställningsmeny ───────────────────────────────────────── */}
      {showSettings && (
        <SettingsMenu
          user={user}
          household={household}
          onClose={() => setShowSettings(false)}
          onSignOut={handleSignOut}
        />
      )}
    </>
  );
}

// ── Montera ───────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
