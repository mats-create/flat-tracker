name: Deploy Cloud Functions

on:
  push:
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Autentisera mot Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Installera gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Installera Node.js-beroenden
        run: npm install
        working-directory: functions

      - name: Deploya gmailPush
        run: |
          gcloud functions deploy gmailPush \
            --runtime nodejs20 \
            --trigger-topic gmail-push \
            --memory 512MB \
            --timeout 120s \
            --set-secrets ANTHROPIC_KEY=ANTHROPIC_KEY:latest,GMAIL_CREDENTIALS=GMAIL_CREDENTIALS:latest \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --region us-central1 \
            --source functions \
            --quiet

      - name: Deploya setupGmailPush
        run: |
          gcloud functions deploy setupGmailPush \
            --runtime nodejs20 \
            --trigger-http \
            --memory 256MB \
            --timeout 60s \
            --set-secrets GMAIL_CREDENTIALS=GMAIL_CREDENTIALS:latest \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --region us-central1 \
            --source functions \
            --quiet

      - name: Deploya renewGmailPush
        run: |
          gcloud functions deploy renewGmailPush \
            --runtime nodejs20 \
            --trigger-topic gmail-push \
            --memory 256MB \
            --timeout 60s \
            --set-secrets GMAIL_CREDENTIALS=GMAIL_CREDENTIALS:latest \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --region us-central1 \
            --source functions \
            --quiet

      - name: Deploya enrichListing
        run: |
          gcloud functions deploy enrichListing \
            --no-gen2 \
            --runtime nodejs20 \
            --trigger-event providers/cloud.firestore/eventTypes/document.create \
            --trigger-resource "projects/${{ secrets.FIREBASE_PROJECT_ID }}/databases/(default)/documents/listings/{listingId}" \
            --memory 512MB \
            --timeout 120s \
            --set-secrets ANTHROPIC_KEY=ANTHROPIC_KEY:latest \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --region europe-west1 \
            --source functions \
            --quiet
