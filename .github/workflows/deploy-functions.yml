name: Deploy Firebase Functions

on:
  push:
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installera Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installera Firebase CLI
        run: npm install -g firebase-tools

      - name: Installera funktionsberoenden
        run: npm install
        working-directory: functions

      - name: Autentisera mot Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
          firebase use ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Deploya funktioner och regler
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
          firebase deploy --only functions,firestore:rules --project ${{ secrets.FIREBASE_PROJECT_ID }}
